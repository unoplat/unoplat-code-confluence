version: '3'

tasks:
  install:
    desc: Install dependencies with uv
    cmds:
      - uv sync

  test:
    desc: Run pytest through uv
    deps: [install]
    cmds:
      - uv run pytest -v tests/

  test:watch:
    desc: Run pytest in watch mode
    deps: [install]
    cmds:
      - uv run pytest -v -f tests/

  typecheck:
    desc: Run pyrefly type checker on the codebase
    cmds:
      - uv run --group dev pyrefly check src/

  typecheck-file:
    desc: Run pyrefly type checker on a specific file (usage - task typecheck-file FILE=path/to/file.py)
    cmds:
      - uv run --group dev pyrefly check src/{{.FILE}}

  all:
    desc: Run all checks (install, typecheck, test)
    cmds:
      - task: install
      - task: typecheck
      - task: test
