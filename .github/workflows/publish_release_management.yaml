name: Merge with dev branch

on:
  pull_request:
    types: [closed]
    branches:
      - dev

jobs:
  dev-pr-merge:
    if: github.event.pull_request.merged == true
    permissions: write-all
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release_action_plan.outputs.releases_created }}
      release_pr_created: ${{ steps.release_action_plan.outputs.prs_created }}
      release_pr_branch: ${{ steps.extract-release-pr.outputs.branch }}
      refresh_flow_bridge_lock: ${{ steps.create-matrix.outputs.refresh_flow_bridge_lock }}
      refresh_query_engine_lock: ${{ steps.create-matrix.outputs.refresh_query_engine_lock }}
      matrix: ${{ steps.create-matrix.outputs.matrix }}   # noqa: unknown-context
      has_docker_images: ${{ steps.create-matrix.outputs.has_docker_images }}
    steps:
    - name: Checkout our repository
      uses: actions/checkout@v2
      with:
        ref: dev

    - name: Configure Git
      run: |
        git config user.name "$GITHUB_ACTOR"
        git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

    - name: Release Please
      id: release_action_plan
      uses: googleapis/release-please-action@v4
      with:
        token: ${{ secrets.PAT }}  # Changed from GITHUB_TOKEN to use Personal Access Token
        config-file: .github/configuration/release-please-config.json
        manifest-file: .github/configuration/release-please-manifest.json
        include-component-in-tag: true
        target-branch: dev

    - name: Extract release PR metadata
      id: extract-release-pr
      uses: actions/github-script@v5
      env:
        RELEASE_PR_JSON: ${{ steps.release_action_plan.outputs.pr }}
      with:
        script: |
          const prRaw = process.env.RELEASE_PR_JSON || '';
          if (!prRaw) {
            core.setOutput('branch', '');
            return;
          }

          const pr = JSON.parse(prRaw);
          core.setOutput('branch', pr.headBranchName || '');
        
    - name: Create matrix for release    
      id: create-matrix
      uses: actions/github-script@v5
      with:
        script: |
          const allOutputs = ${{ toJson(steps.release_action_plan.outputs) }};
          const pathsReleased = JSON.parse('${{ steps.release_action_plan.outputs.paths_released }}');
          const flowBridgePath = 'unoplat-code-confluence-ingestion/code-confluence-flow-bridge';
          const queryEnginePath = 'unoplat-code-confluence-query-engine';
          
          console.log("Processing paths:", pathsReleased);
          
          const includeArray = pathsReleased.map((path) => {
            if (!path.endsWith('code-confluence-flow-bridge') && !path.endsWith('unoplat-code-confluence-frontend') && !path.endsWith('unoplat-code-confluence-query-engine')) {
              console.log(`Skipping non-docker component: ${path}`);
              return null;
            }
            
            const name = allOutputs[`${path}--name`];
            const tag_name = allOutputs[`${path}--tag_name`];
            
            const image_name = name.split(':')[0].trim();
            const version = tag_name.split('-v')[1];
            
            console.log(`Processing docker component: ${path} -> ${image_name}:${version}`);
            return { path, image_name, version };
          }).filter(item => item !== null);
          
          const hasDockerImages = includeArray.length > 0;
          // Prevent empty matrix error by adding a sentinel if needed
          const matrixObj = hasDockerImages
            ? { include: includeArray }
            : { include: [{ path: '__skip__', image_name: '__skip__', version: '0' }] };

          console.log("Final Docker Matrix:", matrixObj.include);
          core.setOutput('matrix', JSON.stringify(matrixObj));
          core.setOutput('has_docker_images', hasDockerImages.toString());
          core.setOutput('refresh_flow_bridge_lock', pathsReleased.includes(flowBridgePath).toString());
          core.setOutput('refresh_query_engine_lock', pathsReleased.includes(queryEnginePath).toString());

  refresh-release-pr-lockfiles:
    name: Refresh Release PR Lockfiles
    runs-on: ubuntu-latest
    needs: dev-pr-merge
    permissions:
      contents: write
    if: needs.dev-pr-merge.outputs.release_pr_created == 'true' && (needs.dev-pr-merge.outputs.refresh_flow_bridge_lock == 'true' || needs.dev-pr-merge.outputs.refresh_query_engine_lock == 'true')
    steps:
      - name: Checkout Release PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.dev-pr-merge.outputs.release_pr_branch }}
          token: ${{ secrets.PAT }}
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Refresh flow-bridge lockfile
        if: needs.dev-pr-merge.outputs.refresh_flow_bridge_lock == 'true'
        working-directory: unoplat-code-confluence-ingestion/code-confluence-flow-bridge
        env:
          GITHUB_PAT_TOKEN: ${{ secrets.PAT }}
        run: uv lock

      - name: Refresh query-engine lockfile
        if: needs.dev-pr-merge.outputs.refresh_query_engine_lock == 'true'
        working-directory: unoplat-code-confluence-query-engine
        env:
          GITHUB_PAT_TOKEN: ${{ secrets.PAT }}
        run: uv lock

      - name: Commit refreshed lockfiles
        shell: bash
        run: |
          git add -- \
            unoplat-code-confluence-ingestion/code-confluence-flow-bridge/uv.lock \
            unoplat-code-confluence-query-engine/uv.lock

          if git diff --cached --quiet; then
            echo "No lockfile changes to commit."
            exit 0
          fi

          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore(release): refresh uv lockfiles"

          git push origin "HEAD:${{ needs.dev-pr-merge.outputs.release_pr_branch }}"

  release-docker-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: dev-pr-merge
    permissions: 
      contents: read
      packages: write
    if: needs.dev-pr-merge.outputs.release_created == 'true' && needs.dev-pr-merge.outputs.has_docker_images == 'true'
    strategy:
      matrix: ${{ fromJson(needs.dev-pr-merge.outputs.matrix) }}  # noqa: unknown-context
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
          
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:${{ matrix.version }}

      - name: Install js-yaml
        run: npm install js-yaml

