version: "3"

tasks:
  start-dependencies:
    desc: Start all dependencies using docker-compose including code-confluence-flow-bridge
    cmds:
      - docker compose -f local-dependencies-docker-compose.yml up -d
      - echo "Waiting for services to be ready..."
      - sleep 15 # Wait for services to initialize

  stop-dependencies:
    desc: Stop all dependencies and remove volumes
    cmds:
      - docker compose -f local-dependencies-docker-compose.yml down --volumes

  start-dependencies-without-flow-bridge:
    desc: Start dependencies (without code-confluence-flow-bridge) using docker-compose
    cmds:
      - docker compose -f local-dependencies-without-flow-bridge-docker-compose.yml up -d
      - echo "Waiting for services to be ready..."
      - sleep 15

  stop-dependencies-without-flow-bridge:
    desc: Stop dependencies (without flow-bridge) and remove volumes
    cmds:
      - docker compose -f local-dependencies-without-flow-bridge-docker-compose.yml down --volumes

  sync:
    desc: Setup project with dependencies
    dir: .
    cmds:
      - uv sync

  update-package:
    desc: Update a specific package to the latest allowed version using uv (usage - task update-package PACKAGE=package_name)
    vars:
      PACKAGE: "{{.PACKAGE}}"
    requires:
      vars: [PACKAGE]
    cmds:
      - uv lock --upgrade-package {{.PACKAGE}}

  update-all-packages:
    desc: Update all packages to the latest allowed versions using uv
    cmds:
      - uv lock --upgrade

  run-query-engine-backend-dev:
    desc: Run FastAPI query engine in development mode
    deps: [sync]
    dir: src/unoplat_code_confluence_query_engine
    env:
      CODE_CONFLUENCE_BRIDGE_URL: "http://localhost:8000"
      TOKEN_ENCRYPTION_KEY: "0PiVvlu6HExNWkYjukuG0CAV930B4OsqXNPItAvsxhQ="
      MCP_SERVERS_CONFIG_PATH: "../../mcp-servers.json"
      CODEX_OPENAI_CALLBACK_PORT: "1455"
      CODEX_OPENAI_REDIRECT_URI: "http://localhost:1455/auth/callback"
      # Debug/profiling envs. Defaults keep normal dev behavior unchanged;
      # override at invocation time, e.g.
      # QUERY_ENGINE_TEMPORAL_DEBUG_MODE=1 task run-query-engine-backend-dev
      QUERY_ENGINE_TEMPORAL_DEBUG_MODE: "{{.QUERY_ENGINE_TEMPORAL_DEBUG_MODE | default \"0\"}}"
      QUERY_ENGINE_TEMPORAL_ACTIVITY_TIMEOUT_MULTIPLIER: "{{.QUERY_ENGINE_TEMPORAL_ACTIVITY_TIMEOUT_MULTIPLIER | default \"1\"}}"
      QUERY_ENGINE_TEMPORAL_BASE_ACTIVITY_TIMEOUT_SECONDS: "{{.QUERY_ENGINE_TEMPORAL_BASE_ACTIVITY_TIMEOUT_SECONDS | default \"\"}}"
      QUERY_ENGINE_TEMPORAL_MODEL_ACTIVITY_TIMEOUT_SECONDS: "{{.QUERY_ENGINE_TEMPORAL_MODEL_ACTIVITY_TIMEOUT_SECONDS | default \"\"}}"
      QUERY_ENGINE_TEMPORAL_TOOLSET_ACTIVITY_TIMEOUT_SECONDS: "{{.QUERY_ENGINE_TEMPORAL_TOOLSET_ACTIVITY_TIMEOUT_SECONDS | default \"\"}}"
      QUERY_ENGINE_TEMPORAL_TOOL_ACTIVITY_TIMEOUT_SECONDS: "{{.QUERY_ENGINE_TEMPORAL_TOOL_ACTIVITY_TIMEOUT_SECONDS | default \"\"}}"
      QUERY_ENGINE_TEMPORAL_DB_ACTIVITY_TIMEOUT_SECONDS: "{{.QUERY_ENGINE_TEMPORAL_DB_ACTIVITY_TIMEOUT_SECONDS | default \"\"}}"
    cmds:
      - uv run fastapi dev --port 8001

  run-query-engine-memray:
    desc: Run query engine under memray live-remote profiler (terminal 1; pair with memray-tui-query-engine on port 12346). Runs from query-engine root with PYTHONPATH=src because memray bypasses fastapi dev's path-walking.
    deps: [sync]
    env:
      PYTHONPATH: "src"
      CODE_CONFLUENCE_BRIDGE_URL: "http://localhost:8000"
      TOKEN_ENCRYPTION_KEY: "0PiVvlu6HExNWkYjukuG0CAV930B4OsqXNPItAvsxhQ="
      MCP_SERVERS_CONFIG_PATH: "mcp-servers.json"
      CODEX_OPENAI_CALLBACK_PORT: "1455"
      CODEX_OPENAI_REDIRECT_URI: "http://localhost:1455/auth/callback"
    cmds:
      - uv run --group dev memray run --live-remote --live-port 12346 --native -m uvicorn unoplat_code_confluence_query_engine.main:app --host 0.0.0.0 --port 8001

  memray-tui-query-engine:
    desc: Attach memray live TUI to the profiled query engine on port 12346 (terminal 2).
    cmds:
      - uv run --group dev memray live 12346

  run-query-engine-memray-capture:
    desc: Run query engine and capture all allocations to /tmp/query-engine-memray/memray-query-engine.bin for offline peak/temporary allocation analysis. Runs from query-engine root with PYTHONPATH=src because memray bypasses fastapi dev's path-walking.
    deps: [sync]
    env:
      PYTHONPATH: "src"
      CODE_CONFLUENCE_BRIDGE_URL: "http://localhost:8000"
      TOKEN_ENCRYPTION_KEY: "0PiVvlu6HExNWkYjukuG0CAV930B4OsqXNPItAvsxhQ="
      MCP_SERVERS_CONFIG_PATH: "mcp-servers.json"
      CODEX_OPENAI_CALLBACK_PORT: "1455"
      CODEX_OPENAI_REDIRECT_URI: "http://localhost:1455/auth/callback"
    cmds:
      - mkdir -p /tmp/query-engine-memray
      - uv run --group dev memray run --output /tmp/query-engine-memray/memray-query-engine.bin --force --native -m uvicorn unoplat_code_confluence_query_engine.main:app --host 0.0.0.0 --port 8001

  run-query-engine-memray-capture-aggregate:
    desc: Run query engine and capture aggregated allocations to /tmp/query-engine-memray/memray-query-engine-aggregate.bin for smaller long-run flamegraph/table analysis. Not suitable for stats or temporary-allocation reports.
    deps: [sync]
    env:
      PYTHONPATH: "src"
      CODE_CONFLUENCE_BRIDGE_URL: "http://localhost:8000"
      TOKEN_ENCRYPTION_KEY: "0PiVvlu6HExNWkYjukuG0CAV930B4OsqXNPItAvsxhQ="
      MCP_SERVERS_CONFIG_PATH: "mcp-servers.json"
      CODEX_OPENAI_CALLBACK_PORT: "1455"
      CODEX_OPENAI_REDIRECT_URI: "http://localhost:1455/auth/callback"
    cmds:
      - mkdir -p /tmp/query-engine-memray
      - uv run --group dev memray run --output /tmp/query-engine-memray/memray-query-engine-aggregate.bin --force --native --aggregate -m uvicorn unoplat_code_confluence_query_engine.main:app --host 0.0.0.0 --port 8001

  memray-summary-query-engine:
    desc: Generate Memray summary from /tmp/query-engine-memray/memray-query-engine.bin.
    cmds:
      - uv run --group dev memray summary /tmp/query-engine-memray/memray-query-engine.bin

  memray-summary-temporary-query-engine:
    desc: Generate Memray temporary-allocation summary from /tmp/query-engine-memray/memray-query-engine.bin. Requires non-aggregate capture.
    cmds:
      - uv run --group dev memray summary --temporary-allocations /tmp/query-engine-memray/memray-query-engine.bin

  memray-stats-query-engine:
    desc: Generate Memray allocation statistics from /tmp/query-engine-memray/memray-query-engine.bin. Requires non-aggregate capture.
    cmds:
      - uv run --group dev memray stats /tmp/query-engine-memray/memray-query-engine.bin

  memray-tree-query-engine:
    desc: Generate Memray tree report from /tmp/query-engine-memray/memray-query-engine.bin.
    cmds:
      - uv run --group dev memray tree /tmp/query-engine-memray/memray-query-engine.bin

  memray-flamegraph-query-engine:
    desc: Generate interactive flamegraph from /tmp/query-engine-memray/memray-query-engine.bin.
    cmds:
      - uv run --group dev memray flamegraph --force /tmp/query-engine-memray/memray-query-engine.bin
      - echo "Open the generated HTML in /tmp (usually /tmp/memray-flamegraph-query-engine.html)"

  memray-table-query-engine:
    desc: Generate an interactive allocator table from /tmp/query-engine-memray/memray-query-engine.bin.
    cmds:
      - uv run --group dev memray table /tmp/query-engine-memray/memray-query-engine.bin

  dev:
    desc: Start dependencies and run the query engine application
    cmds:
      - task: start-dependencies
      - task: run-dev

  run-ingestion-backend-local:
    desc: Start dependencies for local development (without flow-bridge container). Run servers separately.
    cmds:
      - task: start-dependencies-without-flow-bridge
      - cd ../unoplat-code-confluence-ingestion/code-confluence-flow-bridge && task run-dev-core

  run-memory-profile-ingestion-local:
    desc: Start dependencies and launch flow-bridge (ingestion backend) under memray live-remote profiler (port 12345). In a second terminal run `task memray-tui-ingestion` to attach the heap TUI.
    cmds:
      - task: start-dependencies-without-flow-bridge
      - cd ../unoplat-code-confluence-ingestion/code-confluence-flow-bridge && task run-dev-memray

  memray-tui-ingestion:
    desc: Attach memray live TUI to the profiled flow-bridge (ingestion) worker on port 12345 (delegates to flow-bridge venv where memray is installed).
    cmds:
      - cd ../unoplat-code-confluence-ingestion/code-confluence-flow-bridge && task memray-tui

  mock-sse:
    desc: Run mock SSE server (replays docs/sse-agent-results.txt) on port 8002
    dir: experiments
    cmds:
      - uv run fastapi dev mock_sse_server.py --port 8002

  test:
    desc: Run tests with coverage
    dir: .
    cmds:
      - task: start-dependencies
      - uv sync --group test
      - uv run --python 3.13 --group test pytest --cov=src/unoplat_code_confluence_query_engine --cov-report=html:coverage_reports tests/ -v
      - task: stop-dependencies

  lint:
    desc: Run ruff linter on the codebase
    dir: .
    cmds:
      - uv run --group dev ruff check src/

  lint-fix:
    desc: Run ruff linter and auto-fix issues
    dir: .
    cmds:
      - uv run --group dev ruff check src/ --fix

  typecheck:
    desc: Run basedpyright type checker on the codebase
    dir: .
    cmds:
      - uv run --group dev basedpyright src/

  typecheck-file:
    desc: Run basedpyright type checker on a specific file task typecheck-file FILE=path/to/your/file.py
    dir: .
    cmds:
      - uv run --group dev basedpyright src/{{.FILE}}

  format:
    desc: Format code using ruff
    dir: .
    cmds:
      - uv run --group dev ruff format src/

  code-quality:
    desc: Run all code quality checks (lint + typecheck)
    dir: .
    cmds:
      - task: lint
      - task: typecheck

  find-pytest-errors:
    desc: Diagnose pytest test discovery issues and import errors
    dir: .
    cmds:
      - uv run --group test pytest --collect-only tests/
