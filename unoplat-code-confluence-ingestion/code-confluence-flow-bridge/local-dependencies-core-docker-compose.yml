services:
  # PostgreSQL service
  postgresql:
    image: docker.io/library/postgres:17.2
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=code_confluence
    command: >
      postgres
      -c wal_level=logical
      -c listen_addresses=*
      -c max_connections=200
      -c idle_in_transaction_session_timeout=300000
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=6
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - code-confluence-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      options:
        max-size: 50m
        max-file: "3"

  # Electric sync service (logical replication consumer)
  electric:
    image: docker.io/electricsql/electric:1.4.13
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgresql:5432/code_confluence?sslmode=disable
      # Not suitable for production. Only use insecure mode in development or if you've otherwise secured the Electric API.
      # See https://electric-sql.com/docs/guides/security
      ELECTRIC_INSECURE: true
    ports:
      - "3001:3000"
    networks:
      - code-confluence-network
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped
    logging:
      options:
        max-size: 50m
        max-file: "3"

  # Temporal server
  temporal:
    container_name: temporal
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgresql
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    image: temporalio/auto-setup:1.29.1
    networks:
      - code-confluence-network
    ports:
      - "7233:7233"
    configs:
      - source: temporal-dynamic-config
        target: /etc/temporal/config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD-SHELL", "tctl cluster health | grep -i SERVING || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      options:
        max-size: 50m
        max-file: "3"

  # Temporal Admin Tools
  temporal-admin-tools:
    container_name: temporal-admin-tools
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    image: temporalio/admin-tools:1.29.1-tctl-1.18.4-cli-1.5.0
    networks:
      - code-confluence-network
    stdin_open: true
    tty: true
    restart: unless-stopped
    logging:
      options:
        max-size: 50m
        max-file: "3"

  # Temporal UI
  temporal-ui:
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - TEMPORAL_CSRF_COOKIE_INSECURE=True
    image: temporalio/ui:2.43.3
    networks:
      - code-confluence-network
    ports:
      - "8081:8080"
    restart: unless-stopped
    logging:
      options:
        max-size: 50m
        max-file: "3"

# Add default config for Temporal
configs:
  temporal-dynamic-config:
    content: |
      system.forceSearchAttributesCacheRefreshOnRead:
        - value: true
          constraints: {}
      limit.maxIDLength:
        - value: 255
          constraints: {}

networks:
  code-confluence-network:
    driver: bridge
    name: code-confluence-network

volumes:
  postgresql_data:
    driver: local
